<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>筋肉クラブ</title>
    <!-- GitHub Pages has no server-side rewrites for client-side routes, so this
         encodes the requested deep link as a query string and redirects to the
         SPA's index.html, which decodes it back (see the script in index.html). -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1 // "/muscle_club" -> keep 1 segment
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
